              <h2>
                Welcome Back
              </h2>
              <p>
                Sign in to access the water tank monitoring platform
              </p>
            </div>
            <!--begin::Form-->
            <div class="body-size">
              <form
                class="form w-100 my-5"
                [formGroup]="loginForm"
                novalidate="novalidate"
                id="kt_login_signin_form"
                (ngSubmit)="submit()"
              >
                <!-- begin::Alert error-->
                <ng-container *ngIf="hasError">
                  <div class="mb-lg-15 alert alert-danger">
                    <div class="alert-text font-weight-bold">
                      The login details are incorrect
                    </div>
                  </div>
                </ng-container>
                <!-- end::Alert error-->

                <!--begin::Form group-->
                <div class="fv-col-6 mb-8">
                  <!-- <label class="form-label fs-6 fw-bolder text-dark">{{'Validation.EmailAddress'|translate}}</label> -->
                  <label for="">{{ "loginPage.logInEmail" | translate }}</label>

                  <div class="input-group custom-input">

  <span class="input-group-text">
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
      <path d="M16.6667 3.33325H3.33341C2.41294 3.33325 1.66675 4.07944 1.66675 4.99992V14.9999C1.66675 15.9204 2.41294 16.6666 3.33341 16.6666H16.6667C17.5872 16.6666 18.3334 15.9204 18.3334 14.9999V4.99992C18.3334 4.07944 17.5872 3.33325 16.6667 3.33325Z"
        stroke="#90A1B9" stroke-width="1.66667" stroke-linecap="round" stroke-linejoin="round"/>

      <path d="M18.3334 5.83325L10.8584 10.5833C10.6011 10.7444 10.3037 10.8299 10.0001 10.8299C9.69648 10.8299 9.39902 10.7444 9.14175 10.5833L1.66675 5.83325"
        stroke="#90A1B9" stroke-width="1.66667" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </span>

  <!-- input -->
  <input
    class=""
    type="email"
    [placeholder]="'loginPage.enterEmail' | translate"
    name="email"
    formControlName="email"
    autocomplete="off"
    [ngClass]="{
      'is-invalid': loginForm.controls['email'].invalid,
      'is-valid': loginForm.controls['email'].valid
    }"
  />

</div>

                  <ng-container
                    [ngTemplateOutlet]="formError"
                    [ngTemplateOutletContext]="{
                      validation: 'required',
                      message: 'loginPage.thisFieldIsRequired' | translate,
                      control: loginForm.controls['email']
                    }"
                  ></ng-container>
                  <ng-container
                    [ngTemplateOutlet]="formError"
                    [ngTemplateOutletContext]="{
                      validation: 'pattern',
                      message: 'loginPage.thisFieldIsRequired' | translate,
                      control: loginForm.controls['email']
                    }"
                  ></ng-container>
                </div>
                <!--end::Form group-->

                <!--begin::Form group-->
                <div class="fv-row mb-3">
                  <!-- <label class="form-label fw-bolder text-dark fs-6 mb-0">{{'SingUp.Password'|translate}}</label> -->
                  <div class="input-group d-block mb-5">
                    <label for="">{{ "loginPage.Password" | translate }}</label>

  <span class="input-group-text">

                      <input
                      class="password_input"
                        [placeholder]="'loginPage.enterPassword' | translate"
                        [type]="showPassword ? 'text' : 'password'"
                        name="password"
                        autocomplete="off"
                        formControlName="password"
                        [ngClass]="{
                          'is-invalid': loginForm.controls['password'].invalid,
                          'is-valid': loginForm.controls['password'].valid
                        }"
                      />
                      <span class="input-group-text  " id="basic-addon1">
                        <i
                          class="toggle-password fa fa-fw fa-eye-slash"
                          [ngClass]="showPassword ? ' fa-eye' : ' fa-eye-slash'"
                          (click)="togglePasswordVisibilty()"

<ng-template
  #formError
  let-control="control"
  let-message="message"
  let-validation="validation"
>
  <ng-container
    *ngIf="control.hasError(validation) && (control.dirty || control.touched)"
  >
    <div class="fv-plugins-message-container">
      <div class="fv-help-block">
        <span role="alert">
          {{ message }}
        </span>
      </div>
    </div>
  </ng-container>
</ng-template>
