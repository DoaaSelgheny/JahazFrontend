<div class="modal-header">
  <button type="button" class="btn-close" aria-label="Close" (click)="closeModal()"></button>
</div>
<div class="title text-center" *ngIf="!isEdit">{{ "categoryManager.addCategory" | translate }}</div>
<div class="title text-center" *ngIf="isEdit">{{ "categoryManager.editCategory" | translate }}</div>
<div class="modal-body">
  <form [formGroup]="userModalForm">
    <div class="row">
      <div class="col-sm-12 mb-5">
        <label for="carNumber" class="form-label">{{ "branches.brand" | translate }} </label>
        <span class="text-danger mx-2 fs-2">*</span>
        <div class=" mt-3 ">
          <select class="form-select" formControlName="brandId" (change)="getMinPoints($any($event).target.value)">
            <option [value]="null">{{"categoryManager.chooseBrand"|translate}}</option>
            <option *ngFor="let item of brands" [value]="item.id">
              {{item.name}}
            </option>
          </select>
        </div>
        <ng-container [ngTemplateOutlet]="formError" [ngTemplateOutletContext]="{
            validation: 'required',
            message: 'Validation.ThisFieldIsRequired' | translate,
            control: userModalForm.controls['brandId']
          }"></ng-container>

      </div>
      <div class="col-sm-12 mb-5">
        <label for="carMake" class="form-label">
          {{ "categoryManager.catergoryName" | translate }} </label><span class="text-danger mx-2 fs-2">*</span>
        <input formControlName="name" id="name" type="text" class="form-control"
          [placeholder]="'categoryManager.catergoryName' | translate" />
        <ng-container [ngTemplateOutlet]="formError" [ngTemplateOutletContext]="{
            validation: 'required',
            message: 'Validation.ThisFieldIsRequired' | translate,
            control: userModalForm.controls['name']
          }"></ng-container>
      </div>

        <div class="row">

        <div class="col-md-5 col-sm-12 mb-5">
          <label class="form-label">{{"categoryManager.points"|translate}}</label>
          <span class="text-danger mx-2 fs-2">*</span>
          <i class="fa-solid fa-circle-info" placement="top" [ngbTooltip]="tipContent" tooltipClass="my-custom-class"></i>
          <input [attr.disabled]="true" formControlName="minPoints" id="minPoints" type="text" class="form-control" />
          
          <ng-template #tipContent>
            <p class="fs-4 mb-0">{{'categoryManager.hint1'| translate}}</p>
          </ng-template>
        </div>

        <div class="col-md-2 col-sm-12 mt-5">
          <i class="fa-solid fa-equals  d-none  d-md-flex mt-4 mb-1 p-5  fa-10x align-items-center justify-content-center"></i>
        </div>

          <!-- <div class="col-md-5 col-sm-12 mb-5">
            <input [attr.disabled]="true" formControlName="minPoints" id="minPoints" type="text" class="form-control" />
          </div> -->

          <div class="col-md-5 col-sm-12 mt-4 pt-5">
            <input formControlName="maxPoints" id="maxPoints" type="text" class="form-control"
              [placeholder]="'categoryManager.to' | translate" />

            <ng-container [ngTemplateOutlet]="formError" [ngTemplateOutletContext]="{
                validation: 'required',
                message: 'Validation.ThisFieldIsRequired' | translate,
                control: userModalForm.controls['maxPoints']
              }"></ng-container>
            <ng-container [ngTemplateOutlet]="formError" [ngTemplateOutletContext]="{
              validation: 'pattern',
              message: 'Validation.numberonly' | translate,
              control: userModalForm.controls['maxPoints']
            }"></ng-container>
          </div>
        </div>

      <div class="row">
        <div class="col-md-5 col-sm-12 mb-5">
          <label for="fullName" class="form-label">
            {{ "categoryManager.everyRiyal" | translate }} </label>
          <span class="text-danger mx-2 fs-2">*</span>
          <input formControlName="totalPrice" id="totalPrice" type="text" readonly [attr.disabled]="true" class="form-control"
            [placeholder]="'categoryManager.price' | translate" />
          <ng-container [ngTemplateOutlet]="formError" [ngTemplateOutletContext]="{
              validation: 'required',
              message: 'Validation.ThisFieldIsRequired' | translate,
              control: userModalForm.controls['totalPrice']
            }"></ng-container>
          <ng-container [ngTemplateOutlet]="formError" [ngTemplateOutletContext]="{
              validation: 'pattern',
              message: 'Validation.numberonly' | translate,
              control: userModalForm.controls['totalPrice']
            }"></ng-container>
        </div>

        <div class="col-md-2 mt-5">
          <i class="fa-solid fa-equals  d-none
        d-md-flex mt-4 mb-1 p-4   fa-10x align-items-center justify-content-center"></i>
        </div>
        <div class="col-md-5 col-sm-12  mb-5">
          <label for="carMakeModel" class="form-label">
            {{ "categoryManager.partOfPoint" | translate }} </label><span class="text-danger mx-2 fs-2">*</span>
          <i class="fa-solid fa-circle-info" placement="top" [ngbTooltip]="tipContent2"
            tooltipClass="my-custom-class"></i>
          <ng-template #tipContent2>
            <p class="fs-4 mb-0">{{'categoryManager.hint2'| translate}}</p>
          </ng-template>
          <input formControlName="totalPoints" id="totalPoints" type="text" class="form-control"
            [placeholder]="'categoryManager.pointsNo' | translate" />

          <ng-container [ngTemplateOutlet]="formError" [ngTemplateOutletContext]="{
              validation: 'required',
              message: 'Validation.ThisFieldIsRequired' | translate,
              control: userModalForm.controls['totalPoints']
            }"></ng-container>
          <ng-container [ngTemplateOutlet]="formError" [ngTemplateOutletContext]="{
              validation: 'pattern',
              message: 'Validation.numberonly' | translate,
              control: userModalForm.controls['totalPoints']
            }"></ng-container>

          <ng-container [ngTemplateOutlet]="formError" [ngTemplateOutletContext]="{
            validation: 'max',
            message: 'Validation.maxOfPoint' | translate,
            control: userModalForm.controls['totalPoints']
          }"></ng-container>


        </div>
      </div>
      <div class="col-lg-12 mb-5">
        <label for="description" class="form-label">
          {{ "categoryManager.descrtiption" | translate }} </label>
        <span class="text-danger mx-2 fs-2">*</span>
        <textarea class="rectangle-12 col-12" formControlName="description"
          [placeholder]="'categoryManager.descrtiption' | translate"></textarea>
        <ng-container [ngTemplateOutlet]="formError" [ngTemplateOutletContext]="{
            validation: 'required',
            message: 'Validation.description' | translate,
            control: userModalForm.controls['description']
          }"></ng-container>
      </div>
    </div>
  </form>
</div>

<div class="page-action">
  <!-- <button type="submit" class="" (click)="submit()">
    {{ "users.save" | translate }}
  </button> -->
  <button type="submit" class="" (click)="totalCount >= 10 ? specialFunction() : submit()">
    {{ "users.save" | translate }}
  </button>

  <button type="button" class="" (click)="closeModal()">
    {{ "users.cancel" | translate }}
  </button>
  <ng-template #formError let-control="control" let-message="message" let-validation="validation">
    <ng-container *ngIf="control.hasError(validation) && (control.dirty || control.touched)">
      <div class="fv-plugins-message-container">
        <div class="fv-help-block">
          <span role="alert">
            {{ message }}
          </span>
        </div>
      </div>
    </ng-container>
  </ng-template>
</div>
