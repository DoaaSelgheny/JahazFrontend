<section class="smart-page">
  <div class="container">
    <div class="page-title">
      <header>
        <h3>{{ "smart.smartPage" | translate }}</h3>
      </header>
    </div>
    <div class="page-content">
      <article>
        <div
          class="d-flex align-items-center justify-content-between text-center"
        >
          <h4>{{ "smart.subTitle" | translate }}</h4>
          <button
            class="btn btn-outline-primary mt-4 filter"
            (click)="openFilter()"
          >
            <img
              src="assets/imgs/zalol/smart/filter.svg"
              alt="filter"
              class="me-2"
            />
            {{ "smart.filter" | translate }}
          </button>
        </div>
        <div class="btns-tab flex d-lg-flex justify-content-between">
          <div class="flex d-sm-flex">
            <button
              [ngClass]="{ active: this.tab === 'dashboard' }"
              (click)="changeTab('dashboard')"
            >
              <img
                src="assets/imgs/zalol/smart/dashboard.svg"
                alt="filter"
                class="ms-2"
              />
              {{ "smart.dashboard" | translate }}
            </button>
            <button
              [ngClass]="{ active: this.tab === 'client' }"
              (click)="changeTab('client')"
            >
              <img
                src="assets/imgs/zalol/smart/client.svg"
                alt="filter"
                class="ms-2"
              />
              {{ "smart.clients" | translate }}
            </button>
            <button
              [ngClass]="{ active: this.tab === 'requests' }"
              (click)="changeTab('requests')"
            >
              <img
                src="assets/imgs/zalol/smart/requests.svg"
                alt="filter"
                class="ms-2"
              />
              {{ "smart.requests" | translate }}
            </button>
          </div>

            <div
              class="excel d-flex align-items-center justify-content-center mt-1"
              (click)="getExport()"
            >

<div class="d-flex" *ngIf="brands&&brands.length>0">
      <div class="mx-2">
              <select
                class="form-select Select"
                [(ngModel)]="BrandId"
                (change)="changeBrand($any($event).target.value)"
              >
                <option *ngFor="let item of brands" [value]="item.id">
                  {{ item.name }}
                </option>
              </select>
            </div>

            <div class="mx-2" *ngIf="BrandId">
              <select
                class="form-select Select"
                [(ngModel)]="Branch"
                (change)="getData()"
              >
                <option selected [ngValue]="null">
                  {{ "dashboardBrandManager.selectBranch" | translate }}
                </option>
                <option *ngFor="let item of branchs" [ngValue]="item.id">
                  {{ item.name }}
                </option>
              </select>
            </div>
</div>
        
          </div>
        </div>

        <div class="tabs-content">
          <div>
            <div *ngIf="tab === 'dashboard'">
              <app-first-tab
                [filterValue]="formValue"
                [BranchIdFilter]="Branch"
                [BrandIdFilter]="BrandId"
              ></app-first-tab>
            </div>
            <div *ngIf="tab === 'client'">
              <app-second-tab
                [filterValue]="formValue"
                [BranchIdFilter]="Branch"
                [BrandIdFilter]="BrandId"
              >
              </app-second-tab>
            </div>
            <div *ngIf="tab === 'requests'">
              <app-third-tab
                [filterValue]="formValue"
                [BranchIdFilter]="Branch"
                [BrandIdFilter]="BrandId"
              ></app-third-tab>
            </div>
          </div>
        </div>
      </article>
    </div>
  </div>
</section>
