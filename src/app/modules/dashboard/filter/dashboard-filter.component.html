<div class="p-3 rounded-4 filterModal">
  <div class="modal-header border-0">
    <h5 class="modal-title mx-auto">Search Filter</h5>
    <button type="button" class="bg-transparent" (click)="close()">
      <i class="fa-solid fa-xmark"></i>
    </button>
  </div>

  <div class="mt-4 modal_body">
    <form [formGroup]="filterForm">
      <div class="date-wrapper mb-3">
        <label class="mb-2">From date</label>
        <div class="position-relative">
          <input type="date" class="form-control date-input" formControlName="Date" #dateInput />
          <span class="date-icon" (click)="openCalendar(dateInput)">
            <i class="bi bi-calendar3"></i>
          </span>
        </div>
      </div>

      <div class="date-wrapper mb-3">
        <label class="mb-2">To date</label>
        <div class="position-relative">
          <input type="date" class="form-control date-input" formControlName="toDate" #dateInput1 />
          <span class="date-icon" (click)="openCalendar(dateInput1)">
            <i class="bi bi-calendar3"></i>
          </span>
        </div>
      </div>
    </form>
  </div>

  <div class="modal-footer border-0 d-flex justify-content-between">
    <button class="btn btn-primary" (click)="applyFilter()">Apply</button>
    <button class="btn btn-light" (click)="reset()">Reset</button>
  </div>
</div>
